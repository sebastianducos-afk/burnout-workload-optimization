name: run-pipeline

# Ejecuta el pipeline completo (Fases 1-7) en una máquina limpia de Ubuntu
# para demostrar que el repositorio es reproducible por cualquier persona.

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar GLPK (solver para Fases 6 y 7)
        run: sudo apt-get update && sudo apt-get install -y libglpk-dev

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Cachear paquetes de R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('install_dependencies.R') }}

      - name: Instalar dependencias de R
        run: Rscript install_dependencies.R

      - name: Ejecutar pipeline completo
        run: Rscript run_all.R

      - name: Subir artefactos generados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: salidas-pipeline
          path: |
            datos sinteticos/
            figures fase 2/
            data fase 3/
            fase 4/
            fase 5/
            fase_06_optimizacion/
            fase_07_evaluacion/
          if-no-files-found: ignore
